---

- name: install yum-utils
  yum:
    name: yum-utils
    state: present
    update_cache: yes


- name: add docker repo
  shell: yum-config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo

- name: install docker
  yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: load kernel modules required for docker networking on RHEL 10+
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - xt_addrtype
    - br_netfilter
    - overlay
  when: ansible_distribution_major_version|int >= 10
  ignore_errors: true

- name: ensure kernel modules are loaded on boot for RHEL 10+
  ansible.builtin.lineinfile:
    path: /etc/modules-load.d/docker.conf
    line: "{{ item }}"
    create: yes
    mode: '0644'
  loop:
    - xt_addrtype
    - br_netfilter
    - overlay
  when: ansible_distribution_major_version|int >= 10

...
